<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3-Tier Birthday Cake</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #f3e5f5 0%, #e1bee7 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        h1 {
            color: #7b1fa2;
            text-shadow: 2px 2px white;
            margin: 0;
            font-size: 2rem;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Happy Birthday! 🎂</h1>
        <p style="color: #4a148c;">Drag to rotate the cake</p>
    </div>

    <script>
        let scene, camera, renderer, cake;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);
            camera.lookAt(0, 1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 0.5);
            directional.position.set(5, 10, 7);
            directional.castShadow = true;
            scene.add(directional);

            createCake();
            animate();
        }

        function createCake() {
            cake = new THREE.Group();

            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const purpleMat = new THREE.MeshStandardMaterial({ color: 0xba68c8 });
            const roseMat = new THREE.MeshStandardMaterial({ color: 0xe57373 });

            // 3 Tiers (Bottom, Middle, Top)
            const tiers = [
                { r: 2, h: 1.2, y: 0.6 },
                { r: 1.5, h: 1, y: 1.7 },
                { r: 1, h: 0.8, y: 2.6 }
            ];

            tiers.forEach((t, i) => {
                // Main Tier Body
                const geo = new THREE.CylinderGeometry(t.r, t.r, t.h, 64);
                const mesh = new THREE.Mesh(geo, whiteMat);
                mesh.position.y = t.y;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                cake.add(mesh);

                // Purple Icing Trim (bottom of each tier)
                const trimGeo = new THREE.TorusGeometry(t.r, 0.05, 16, 100);
                const trim = new THREE.Mesh(trimGeo, purpleMat);
                trim.rotation.x = Math.PI / 2;
                trim.position.y = t.y - (t.h / 2);
                cake.add(trim);

                // Add "Decorations" (Simple Roses/Balls)
                for(let j=0; j<12; j++) {
                    const angle = (j / 12) * Math.PI * 2;
                    const decoration = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), roseMat);
                    decoration.position.set(
                        Math.cos(angle) * (t.r + 0.05),
                        t.y,
                        Math.sin(angle) * (t.r + 0.05)
                    );
                    cake.add(decoration);
                }
            });

            // The Candle
            const candleGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 12);
            const candleMat = new THREE.MeshStandardMaterial({ color: 0xffeb3b });
            const candle = new THREE.Mesh(candleGeo, candleMat);
            candle.position.y = 3.25;
            cake.add(candle);

            // The Flame
            const flameGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const flameMat = new THREE.MeshBasicMaterial({ color: 0xffa000 });
            const flame = new THREE.Mesh(flameGeo, flameMat);
            flame.position.y = 0.3;
            candle.add(flame);

            scene.add(cake);
        }

        // Basic Mouse/Touch Rotation
        let isDragging = false;
        let previousMouseX = 0;

        document.addEventListener('pointerdown', () => isDragging = true);
        document.addEventListener('pointerup', () => isDragging = false);
        document.addEventListener('pointermove', (e) => {
            if (isDragging && cake) {
                const deltaX = e.clientX - previousMouseX;
                cake.rotation.y += deltaX * 0.01;
            }
            previousMouseX = e.clientX;
        });

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) cake.rotation.y += 0.005; // Auto-rotate
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
