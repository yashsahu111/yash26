<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Birthday Cake Cutting</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --pink-bg-light: #fce4ec;
            --pink-bg-dark: #f8bbd0;
            --pink-text: #ad1457;
        }

        body {
            background: linear-gradient(135deg, var(--pink-bg-light) 0%, var(--pink-bg-dark) 100%);
            color: var(--pink-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            width: 100vw;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
        }

        .ui-panel {
            text-align: center;
            padding: 20px;
            width: 100%;
            pointer-events: none; /* Let clicks pass to the 3D canvas */
            z-index: 10;
        }

        .header h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            opacity: 0.9;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.7;
            margin: 0;
        }

        /* The canvas container for Three.js */
        #cake-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #reset-btn {
            pointer-events: auto; /* Enable clicks on the button */
            padding: 12px 25px;
            background-color: #ec407a;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(236, 64, 122, 0.4);
            cursor: pointer;
            visibility: hidden; /* Start hidden */
            transition: all 0.3s;
        }
    </style>
</head>
<body>

    <div class="ui-panel header">
        <h1>For Someone Special 🎂</h1>
        <p>Tap the cake to cut a real slice!</p>
    </div>

    <div id="cake-container"></div>

    <div class="ui-panel footer">
        <button id="reset-btn">Reset Cake</button>
    </div>

    <script>
        // THREE.js Scene Setup
        let scene, camera, renderer, container;
        let cakeGroup, cakeGeometry, cakeMesh, sliceMesh, plateMesh;
        let isCut = false;
        let resetBtn = document.getElementById('reset-btn');

        // Material Definitions for Realistic Textures
        // 1. Frosting (Top & Sides) - Pink
        const frostingMaterial = new THREE.MeshStandardMaterial({
            color: 0xf48fb1,
            roughness: 0.8,
            metalness: 0.1,
            flatShading: false
        });

        // 2. Interior (When cut) - Sponge Cake color
        const spongeMaterial = new THREE.MeshStandardMaterial({
            color: 0xfff3e0,
            roughness: 0.9,
            metalness: 0.0
        });

        // 3. Plate (White)
        const plateMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.2,
            metalness: 0.0
        });

        function init() {
            container = document.getElementById('cake-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            // SCENE & CAMERA
            scene = new THREE.Scene();
            scene.background = null; // Use CSS background

            camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 100);
            camera.position.set(0, 1.8, 3.5);
            camera.lookAt(0, 0.5, 0);

            // RENDERER
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // LIGHTING (Soft ambient + direction for shadow)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(2, 4, 1);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            scene.add(directionalLight);

            createCake();

            // EVENT LISTENERS
            window.addEventListener('resize', onWindowResize);
            container.addEventListener('click', onCakeTap, false);
            container.addEventListener('touchstart', onCakeTap, false); // Mobile Touch
            resetBtn.addEventListener('click', resetCake);

            animate();
        }

        function createCake() {
            cakeGroup = new THREE.Group();

            // 1. Plate
            const plateGeometry = new THREE.CylinderGeometry(1.2, 1.2, 0.05, 32);
            plateMesh = new THREE.Mesh(plateGeometry, plateMaterial);
            plateMesh.position.y = 0.025;
            plateMesh.receiveShadow = true;
            cakeGroup.add(plateMesh);

            // 2. Main Cake Body
            // Realistic full cake, 2 tiers
            cakeGeometry = new THREE.CylinderGeometry(0.9, 0.9, 0.6, 64, 1, false, 0, Math.PI * 2);
            // CylinderGeometry maps texture index: [0: sides, 1: top, 2: bottom]
            const cakeMaterialsArray = [frostingMaterial, frostingMaterial, frostingMaterial];
            cakeMesh = new THREE.Mesh(cakeGeometry, cakeMaterialsArray);
            cakeMesh.position.y = 0.35;
            cakeMesh.castShadow = true;
            cakeMesh.receiveShadow = true;
            cakeGroup.add(cakeMesh);

            // 3. Realistic Slice Geometry
            // Defined as a custom shape / wedge to make it look like a real piece.
            const sliceAngle = Math.PI / 4; // 1/8th of a cake
            const sliceGeometry = new THREE.CylinderGeometry(0.9, 0.9, 0.6, 32, 1, false, 0, sliceAngle);

            // IMPORTANT: Define face materials to show interior sponge on the slice faces.
            // Index 0: Outer Frosting Curve, Index 1: Cut Face (Sponge), Index 2: Cut Face (Sponge), Index 3: Top (Frosting)
            const sliceMaterialsArray = [frostingMaterial, spongeMaterial, spongeMaterial, frostingMaterial];
            sliceMesh = new THREE.Mesh(sliceGeometry, sliceMaterialsArray);
            sliceMesh.position.y = 0.35;
            sliceMesh.position.z = 0.02; // Small offset to prevent geometry fighting
            sliceMesh.rotation.y = -sliceAngle / 2; // Center it
            sliceMesh.castShadow = true;
            sliceMesh.visible = false; // Hidden at start
            cakeGroup.add(sliceMesh);

            scene.add(cakeGroup);
        }

        function onCakeTap(event) {
            if (isCut) return;
            event.preventDefault();
            cutCakeAnimation();
        }

        function cutCakeAnimation() {
            isCut = true;
            
            // 1. Modify Main Cake to look cut.
            // This is complex in standard THREE.js. We achieve it by "hiding" the full cake 
            // and showing a new geometry (main cake MINUS the slice gap). 
            // For simplicity in this script, we'll use a technique: scale the slice to separate.
            
            cakeMesh.visible = false; // Hide the full cake

            // 2. We need a second geometric piece: Main cake minus the slice gap.
            // Define main body wedge (7/8ths)
            const mainBodyAngle = (Math.PI * 2) - (Math.PI / 4);
            const mainBodyGeometry = new THREE.CylinderGeometry(0.9, 0.9, 0.6, 64, 1, false, Math.PI/8, mainBodyAngle);
            
            // Define face materials for main cake to show sponge interior on cut edge.
            const mainBodyMaterialsArray = [frostingMaterial, spongeMaterial, spongeMaterial, frostingMaterial];
            const mainBodyMesh = new THREE.Mesh(mainBodyGeometry, mainBodyMaterialsArray);
            mainBodyMesh.position.y = 0.35;
            mainBodyMesh.rotation.y = Math.PI / 8; // Align gap
            mainBodyMesh.castShadow = true;
            mainBodyMesh.receiveShadow = true;
            mainBodyMesh.name = 'mainBodyMesh'; // Set name for easy deletion on reset
            cakeGroup.add(mainBodyMesh);

            // 3. Show and animate the slice separation.
            sliceMesh.visible = true;

            const duration = 1200; // ms
            const startTime = performance.now();

            function animationStep(now) {
                const progress = Math.min((now - startTime) / duration, 1.0);

                if (progress < 1.0) {
                    // Pull slice away: move along its own centered radial axis
                    const separationDist = progress * 0.7; // How far it slides
                    sliceMesh.position.x = -Math.sin(0) * separationDist;
                    sliceMesh.position.z = 0.02 + Math.cos(0) * separationDist;

                    // Slight lift as it separates
                    sliceMesh.position.y = 0.35 + (progress * 0.1);

                    // Slight twist for extra realism
                    sliceMesh.rotation.y = (-Math.PI / 8) + (progress * 0.2);

                    requestAnimationFrame(animationStep);
                } else {
                    // Show reset button at end
                    resetBtn.style.visibility = 'visible';
                }
            }
            requestAnimationFrame(animationStep);
        }

        function resetCake() {
            // Remove the mainBodyMesh that was added during cutting
            const mainBody = cakeGroup.getObjectByName('mainBodyMesh');
            if(mainBody) cakeGroup.remove(mainBody);

            isCut = false;
            cakeMesh.visible = true;
            sliceMesh.visible = false;
            resetBtn.style.visibility = 'hidden';
            
            // Reset slice geometry positions
            sliceMesh.position.set(0, 0.35, 0.02);
            sliceMesh.rotation.y = -Math.PI / 8;
        }

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Add subtle continuous rotation to the whole group to show 3D detail
            if (cakeGroup && !isCut) {
                cakeGroup.rotation.y += 0.003;
            }

            renderer.render(scene, camera);
        }

        // Run when page loads
        init();
    </script>
</body>
</html>
